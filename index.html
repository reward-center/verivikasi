<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', Arial;
    background:#fff;
    color:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    text-align:center;
    width:90%;
    max-width:420px;
}

h2{margin-bottom:10px;}
.sub{color:#666; font-size:14px; margin-bottom:25px;}

.progress{
    display:flex;
    justify-content:space-between;
    position:relative;
}

.progress::before{
    content:'';
    position:absolute;
    top:20px;
    width:100%;
    height:4px;
    background:#ddd;
}

.line{
    position:absolute;
    top:20px;
    height:4px;
    background:#00c853;
    width:0%;
    transition:1s;
}

.step{
    text-align:center;
    width:33%;
}

.circle{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#ddd;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    font-size:18px;
}

.active .circle{
    background:#00c853;
    color:#fff;
}

.label{
    margin-top:8px;
    font-size:13px;
    color:#888;
}

.active .label{
    color:#00c853;
}

.btn{
    display:none;
    margin-top:30px;
    padding:14px 25px;
    background:#00c853;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="box">
    <h2 id="title">Processing your request...</h2>
    <div class="sub" id="sub">Verifying system, please wait...</div>

    <div class="progress">
        <div class="line" id="line"></div>

        <div class="step" id="s1">
            <div class="circle">📦</div>
            <div class="label" id="t1">Packaging</div>
        </div>

        <div class="step" id="s2">
            <div class="circle">🚚</div>
            <div class="label" id="t2">Shipping</div>
        </div>

        <div class="step" id="s3">
            <div class="circle">✅</div>
            <div class="label" id="t3">Delivered</div>
        </div>
    </div>

    <a href="https://appchecker.space/cl/i/271x3k" class="btn" id="btn" onclick="playSound()">
        Continue
    </a>
</div>

<!-- SOUND -->
<audio id="sound">
  <source src="https://www.soundjay.com/buttons/sounds/button-09.mp3" type="audio/mpeg">
</audio>

<script>
/* AUTO LANGUAGE */
let lang = navigator.language;

if(lang.includes("fr")){
    title.innerText="Traitement en cours...";
    sub.innerText="Vérification du système, veuillez patienter...";
    t1.innerText="Emballage";
    t2.innerText="Expédition";
    t3.innerText="Livré";
    btn.innerText="Continuer";
}
else if(lang.includes("ar")){
    title.innerText="جارٍ المعالجة...";
    sub.innerText="يرجى الانتظار أثناء التحقق...";
    t1.innerText="التعبئة";
    t2.innerText="الشحن";
    t3.innerText="تم التسليم";
    btn.innerText="متابعة";
}

/* PROGRESS */
let line = document.getElementById("line");

setTimeout(()=>{
    s1.classList.add("active");
    line.style.width="33%";
},1500);

setTimeout(()=>{
    s2.classList.add("active");
    line.style.width="66%";
},3000);

setTimeout(()=>{
    s3.classList.add("active");
    line.style.width="100%";
},5000);

setTimeout(()=>{
    btn.style.display="inline-block";
},5500);

/* SOUND PLAY (SAFEST METHOD) */
function playSound(){
    document.getElementById("sound").play();
}
</script>

</body>
</html>
